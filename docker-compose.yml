services:
  mcp:
    build: .
    container_name: lm-docker-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"      # Bind loopback only — expose via reverse proxy (nginx/Cloudflare)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Read-only Docker socket
      - /opt:/opt:ro                                   # Compose project dirs (read-only mount)
    environment:
      MCP_API_KEY: ${MCP_API_KEY}
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      COMPOSE_BASE_DIR: /opt
      LOG_MAX_LINES: "200"
      DOCKER_TIMEOUT: "60"
    group_add:
      - "${DOCKER_GID:-999}"    # GID of docker group on host — check with: stat -c '%g' /var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
