services:

  postgres:
    image: postgres:15
    container_name: lema-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mcp_sessions}
      POSTGRES_USER:     ${POSTGRES_USER:-mcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"  # Loopback only — akses via SSH tunnel dari local
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-mcp_user}", "-d", "${POSTGRES_DB:-mcp_sessions}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  mcp:
    build: .
    container_name: lema-mcp-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8765:8765"      # Bind loopback only — expose via reverse proxy
    environment:
      MCP_API_KEY:      ${MCP_API_KEY}
      MCP_HOST:         "0.0.0.0"
      MCP_PORT:         "8765"
      MCP_EXTERNAL_HOST: ${MCP_EXTERNAL_HOST:-mcp.lemacore.com}
      MCP_EXTERNAL_URL:  ${MCP_EXTERNAL_URL:-https://mcp.lemacore.com}
      DATABASE_URL:     postgresql://${POSTGRES_USER:-mcp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcp_sessions}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lema-mcp-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-mcp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcp_sessions}
      ADMIN_USER:            ${ADMIN_USER}
      ADMIN_PASSWORD_HASH:   ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET:        ${SESSION_SECRET}
    security_opt:
      - no-new-privileges:true

volumes:
  pg_data:
    driver: local
